name: Process Second Pass

on:
  schedule:
    - cron: '30 */4 * * *'   # можно задать своё расписание
  workflow_dispatch:

jobs:
  process-second:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Download Sing-box (Latest)
      run: |
        LATEST_TAG=$(curl -sL https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r '.tag_name')
        echo "Downloading sing-box version: $LATEST_TAG"
        FILENAME="sing-box-${LATEST_TAG#v}-linux-amd64.tar.gz"
        URL="https://github.com/SagerNet/sing-box/releases/download/${LATEST_TAG}/${FILENAME}"
        wget -q "$URL" -O sing-box.tar.gz
        tar -xzf sing-box.tar.gz
        mv sing-box-*/sing-box ./sing-box
        chmod +x ./sing-box
        ./sing-box version

    - name: Run second pass
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
        GIST_ID: ${{ secrets.GIST_ID }}
      run: python process.py

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: second-pass-results
        path: |
          gistfile2.txt
          pings2.json
        overwrite: true
